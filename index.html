<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Bug Hunters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Bug Hunters</h1>

<div id="game-container">
  <canvas id="gameCanvas" width="900" height="500"></canvas>
</div>

<!-- POPUP MISSÃO -->
<div id="missionPopup" class="hidden">
  <div class="popup-content">
    <p>Deseja iniciar a missão?</p>
    <button onclick="startMission()">Sim</button>
    <button onclick="closePopup()">Não</button>
  </div>
</div>

<!-- TELA MISSÃO -->
<div id="missionScreen" class="hidden">
  <div class="popup-content">
    <p id="missionText">Resolva: energia < 20 → retornar base</p>
    <input id="answer" placeholder="Digite: if energia < 20">
    <button onclick="checkAnswer()">Enviar</button>
  </div>
</div>

<script src="player.js"></script>
<script src="mission.js"></script>
<script src="game.js"></script>

</body>
</html>
